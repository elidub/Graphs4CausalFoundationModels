# 128 CPU benchmark configuration - CPU scaling test
benchmark:
  batch_size: 128
  num_workers: 128
  prefetch_factor: 2
  num_batches: 500
  warmup: 50
  shuffle: true

# HTCondor job settings
htcondor:
  request_cpus: 128
  request_memory: "64GB"
  request_disk: "20GB"
  description: "128 CPU scaling benchmark"
