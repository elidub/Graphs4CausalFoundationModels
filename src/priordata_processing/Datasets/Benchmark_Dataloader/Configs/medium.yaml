# Medium benchmark configuration - balanced resource usage
benchmark:
  batch_size: 64
  num_workers: 2
  prefetch_factor: 2
  num_batches: 500
  warmup: 20
  shuffle: true

# HTCondor job settings
htcondor:
  request_cpus: 2
  request_memory: "16GB"
  request_disk: "15GB"
  description: "Medium benchmark with moderate resources"
