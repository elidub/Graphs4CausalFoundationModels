# High memory benchmark configuration - memory intensive workloads
benchmark:
  batch_size: 256
  num_workers: 8
  prefetch_factor: 4
  num_batches: 2000
  warmup: 100
  shuffle: true

# HTCondor job settings
htcondor:
  request_cpus: 8
  request_memory: "64GB"
  request_disk: "25GB"
  description: "High memory benchmark for intensive workloads"
