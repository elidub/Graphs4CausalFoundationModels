# 16 CPU benchmark configuration - CPU scaling test
benchmark:
  batch_size: 128
  num_workers: 16
  prefetch_factor: 2
  num_batches: 500
  warmup: 50
  shuffle: true

# HTCondor job settings
htcondor:
  request_cpus: 16
  request_memory: "32GB"
  request_disk: "20GB"
  description: "16 CPU scaling benchmark"
