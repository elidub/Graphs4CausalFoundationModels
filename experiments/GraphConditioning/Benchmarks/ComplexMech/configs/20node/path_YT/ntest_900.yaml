experiment_name: lingaus_idk_20node_base
description: 20-node Linear-Gaussian SCM benchmark with partial graph knowledge (base variant)
mode: interventional
scm_config:
  num_nodes:
    value: 20
  graph_edge_prob:
    distribution: "beta"
    distribution_parameters:
      alpha: 2.0
      beta: 3.0
  graph_seed:
    distribution: "discrete_uniform"
    distribution_parameters:
      low: 0
      high: 100000
  xgboost_prob:
    distribution: "categorical"
    distribution_parameters:
      choices:
      - 0.0
      - 0.1
      - 0.2
      - 0.3
      probabilities:
      - 0.9
      - 0.1
      - 0.01
      - 0.001
        #- 0.8
        #- 0.1
        #- 0.1
  mechanism_seed:
    distribution: "discrete_uniform"
    distribution_parameters:
      low: 0
      high: 100000
  mlp_nonlins:
    value: "tabicl"
  mlp_num_hidden_layers:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - 0
        - 1
        - 2
        - 3
      probabilities:
        - 0.875
        - 0.1
        - 0.025
        - 0.01
  mlp_hidden_dim:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - 1
        - 2
        - 4
        - 6
        - 8
        - 10
        - 12
        - 14
        - 16
        - 32
      probabilities:
        - 0.7
        - 0.2
        - 0.1
        - 0.05
        - 0.04
        - 0.03
        - 0.02
        - 0.01
        - 0.01
        - 0.01

  mlp_activation_mode:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - "pre"
        - "post"
        - "mixed_in"
      probabilities:
        - 0.3
        - 0.3
        - 0.3

  # Apply parameter-free BatchNorm to inputs before MLP
  mlp_use_batch_norm:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - true
        - false
      probabilities:
        - 0.5
        - 0.5
      
  xgb_node_shape:
    value: [1]
  xgb_num_hidden_layers:
    value: 0
  xgb_hidden_dim:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - 0
        - 16
        - 32
        - 64
  xgb_activation_mode:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - "pre"
        - "post"
        - "mixed_in"
      probabilities:
        - 0.33
        - 0.33
        - 0.34

  # Apply parameter-free BatchNorm to inputs before XGBoost stack
  xgb_use_batch_norm:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - true
        - false
      probabilities:
        - 0.5
        - 0.5
  xgb_node_shape:
    value: [1]
  xgb_n_training_samples:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - 10
        - 50
        - 100
        - 200
        - 500
      probabilities:
        - 0.1
        - 0.1
        - 0.3
        - 0.4
        - 0.5
  xgb_add_noise:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - true
        - false
      probabilities:
        - 0.5
        - 0.5
  random_additive_std:
    value: true
  exo_std_distribution:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - "gamma"
        - "pareto"
      probabilities:
        - 1.0
        - 0.0
  endo_std_distribution:
    distribution: "categorical"
    distribution_parameters:
      choices:
        - "gamma"
        - "pareto"
      probabilities:
        - 1.0
        - 0.0
  exo_std_mean:
    distribution: "lognormal"
    distribution_parameters:
      mean: 1.0
      std: 1.0
  exo_std_std:
    distribution: "uniform"
    distribution_parameters:
      low: 0.1
      high: 0.4
  endo_std_mean:
    distribution: "lognormal"
    distribution_parameters:
      mean: -3.0
      std: 0.6
  endo_std_std:
    distribution: "uniform"
    distribution_parameters:
      low: 0.0
      high: 0.5
  
  # Endogenous noise sparsity: probability of zero noise
  endo_p_zero:
    value: 0.0
  
  # Noise mixture proportions: weights for [Normal, Laplace, StudentT]
  # Must sum to 1.0. If not specified, uses equal weights [0.333, 0.333, 0.333]
  noise_mixture_proportions:
    value: [0.33, 0.33, 0.34] # null = use default equal weights # Example: value: [0.5, 0.3, 0.2]  # 50% Normal, 30% Laplace, 20% StudentT
  
  use_exogenous_mechanisms:
    value: true
  mechanism_generator_seed:
    distribution: "discrete_uniform"
    distribution_parameters:
      low: 0
      high: 100000

dataset_config:
  dataset_size:
    value: 100000000
  max_number_samples_per_dataset:
    value: 1000
  max_number_train_samples_per_dataset:
    value: 1000
  max_number_test_samples_per_dataset:
    value: 1000
  n_test_samples_per_dataset:
    value: 900
  return_adjacency_matrix:
    value: false
  use_partial_graph_format:
    value: true
  hide_fraction_matrix:
    distribution: uniform
    distribution_parameters:
      low: 0.0
      high: 1.0
  min_target_variance:
    value: 1e-2
  max_resample_attempts:
    value: 10000
  max_number_features:
    value: 50
  seed:
    distribution: discrete_uniform
    distribution_parameters:
      low: 0
      high: 100000
  return_ancestor_matrix:
    value: true

preprocessing_config:
  dropout_prob:
    value: 0.0
  shuffle_data:
    value: true
  target_feature:
    value: null
  feature_standardize:
    value: true
  feature_negative_one_one_scaling:
    value: false
  target_negative_one_one_scaling:
    value: true
  remove_outliers:
    value: true
  outlier_quantile:
    value: 0.99
  yeo_johnson:
    value: false
  interventional_distribution_type:
    value: scaled_uniform
  increase_treatment_scale:
    value: false
  distribution_rescale_factor:
    value: 0.0
  ensure_treatment_outcome_path:
    value: false
  ensure_outcome_treatment_path:
    value: true
  ensure_no_connection_treatment_outcome:
    value: false
  test_feature_mask_fraction:
    value: 1.0
  random_seed:
    distribution: discrete_uniform
    distribution_parameters:
      low: 0
      high: 100000
model_config:
  d_model:
    value: 256
  depth:
    value: 6
  heads_feat:
    value: 4
  heads_samp:
    value: 4
  dropout:
    value: 0.0
  hidden_mult:
    value: 2
  num_features:
    value: 1
  normalize_features:
    value: true
  use_graph_conditioning:
    value: false
  graph_conditioning_mode:
    value: partial_gcn_and_soft_attention
  gcn_use_transpose:
    value: false
  gcn_alpha_init:
    value: 0.1
  n_sample_attention_sink_rows:
    value: 10
  n_feature_attention_sink_cols:
    value: 0
  use_bar_distribution:
    value: true
  num_bars:
    value: 1000
  min_width:
    value: 1e-6
  scale_floor:
    value: 1e-3
  max_fit_items:
    value: 1000
  max_fit_batches:
    value: 1000
  log_prob_clip_min:
    value: -100000.0
  log_prob_clip_max:
    value: 100000.0
training_config:
  learning_rate:
    value: 0.0001
  weight_decay:
    value: 1.0e-05
  max_steps:
    value: 50000
  max_epochs:
    value: 1
  batch_size:
    value: 8
  accumulate_grad_batches:
    value: 4
  num_workers:
    value: 70
  early_stopping_patience:
    value: 0
  gradient_clip_val:
    value: 1.0
  scheduler_type:
    value: linear_warmup_cosine_decay
  warmup_ratio:
    value: 0.1
  min_lr_ratio:
    value: 0.1
  checkpoint_dir:
    value: <REPO_ROOT>/experiments/GraphConditioning/Benchmarks/LinGausIDK/checkpoints
  save_every:
    value: 1000
  device:
    value: cuda
  use_amp:
    value: false
  precision:
    value: '32'
  experiment_name:
    value: lingaus_idk_20node_base
  save_dir:
    value: ./experiments/GraphConditioning/Benchmarks/LinGausIDK/logs/20node_base
  log_every_n_steps:
    value: 1
  checkpoint_every_n_steps:
    value: 1000
  eval_enabled:
    value: true
  eval_every:
    value: 1000
  eval_batches:
    value: 200
  eval_dataset_size:
    value: 1000000
  benchmark_eval_fidelity:
    value: minimal
  benchmark_final_fidelity:
    value: minimal
  benchmark_offline:
    value: true
  benchmark_n_estimators:
    value: 1
  model_selection_enabled:
    value: true
  model_selection_metric:
    value: eval/mse_median
  model_selection_mode:
    value: min
  wandb_project:
    value: DoPFN_v2_LinGausIDK
  wandb_run_name:
    value: lingaus_idk_20node_base
  wandb_tags:
    value:
    - lingaus_idk
    - partial_graph
    - 20node
    - base_variant
  wandb_notes:
    value: 'LinGausIDK benchmark: 20-node linear-Gaussian SCM with partial graph knowledge (base variant)'
  wandb_offline:
    value: false
