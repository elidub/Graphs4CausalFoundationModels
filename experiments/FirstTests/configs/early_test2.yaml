# ===============================================================================
# Early Test 1 Configuration - First Pipeline Test
# ===============================================================================
# This configuration serves as the initial end-to-end test if
# training pipeline. It uses minimal settings based on default configurations
# to ensure quick execution while testing all components.
#
# You can specify a prior-distribution over most hyperparamters from which the value will be sampled during training.
# 
# ===============================================================================

experiment_name: "early_test2"
description: "First pipeline test. debug scale with fixed seeds for reproducibility"

# ===============================================================================
# SCM Configuration (Structural Causal Model Generation)
# ===============================================================================
scm_config:
  # Graph Structure Parameters
  num_nodes:  # number of nodes in the SCM, there is one less maximum number of features than that because the target is also a node
    distribution: "discrete_uniform"
    distribution_parameters: {low: 3, high: 20}
  graph_edge_prob:  #probability that any two nodes are connected via an edge. Sparse graphs can be achieved by sampling the edge probability from a right-skewed beta distribution
    distribution: "beta"
    distribution_parameters: {alpha: 2, beta: 5}
  graph_seed:   #seed to sample the graph. You usually don't want to fix this!
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

  # Mechanism Type Selection: Some mechanisms along the edges are implemented as XGboost algorithms fitted on Gaussain noise, and some as MLPs. Xgboost allows to have discrete effects. 
  xgboost_prob:  # global probability that a mechanisms is XGboost. This defines how likely it is that within a single SCM an XGboost mechanism is sampled. 
    distribution: "beta"
    distribution_parameters: {alpha: 2, beta: 8}  # this is a right-skewed distribution that leads to few XGboost mechanisms
    #distribution: "uniform"
    #distribution_parameters: {low: 0.0, high: 0.1}
  mechanism_seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

  # MLP Mechanism Hyperparameters
  mlp_nonlins:  # this string defines the sampling of the nonlinearities. Default is "tabicl", which follows the TabICL paper 
    value: "tabicl"
  mlp_num_hidden_layers:  # number of hidden layers in the MLP
    distribution: "categorical"
    distribution_parameters: {choices: [0, 1, 2], probabilities: [0.7, 0.15, 0.15]}
  mlp_hidden_dim:  # number of hidden variables in the MLP
    distribution: "categorical"
    distribution_parameters: {choices: [4, 8, 16, 32], probabilities: [0.5, 0.25, 0.125, 0.125]}
  mlp_activation_mode:  # if the nonlinearity is applied before or after adding the noise
    distribution: "categorical"
    distribution_parameters: {choices: ["pre", "post"], probabilities: [0.9, 0.1]}
  mlp_node_shape:
    value: [1]

  # XGBoost Mechanism Hyperparameters
  xgb_num_hidden_layers:  # XGboost can have several layers, but this is not tested. If this is zero, the xgb_hidden_dim, xgb_activation_mode parameters are not needed.
    value: 0
  xgb_hidden_dim:
    distribution: "categorical"
    distribution_parameters: {choices: [0, 16, 32, 64]}
  xgb_activation_mode:
    distribution: "categorical"
    distribution_parameters: {choices: ["pre", "post"]}
  xgb_node_shape:
    value: [1]
  xgb_n_training_samples:  # number of training samples to tit the random XGboost. 
    distribution: "discrete_uniform"
    distribution_parameters: {low: 100, high: 500}
  xgb_add_noise:   # add noise to the output of XGboost to get somewhat discrete outputs. 
    distribution: "categorical"
    distribution_parameters: {choices: [true, false], probabilities: [0.2, 0.8]}

  # Noise Distribution Parameters
  random_additive_std:   #whether to sample the standard deviation of the noise from a Gamma distribution P where the distribution over P's standard deviation and mean are defined below
    value: true
  exo_std_distribution:   #distribution type over the STD of the exogenous noise 
    distribution: "categorical"
    distribution_parameters: {choices: ["gamma", "pareto"], probabilities: [1.0, 0.0]}   #Pareto can lead to errors
  endo_std_distribution:   #distribution type over the STD of the endogenous noise (Pareto can be undefined for certain parameters)
    distribution: "categorical"
    distribution_parameters: {choices: ["gamma", "pareto"], probabilities: [1.0, 0.0]}

  # Random Standard Deviation Parameters
  exo_std_mean:  # distribution over the mean of the distribution over the STD of the exogenous noise
    distribution: "lognormal"
    distribution_parameters: {mean: 1.0, std: 1.0}
  exo_std_std:   # distribution over the std of the std of the exogenous noise
    distribution: "uniform"
    distribution_parameters: {low: 0.01, high: 2.0}
  endo_std_mean:  # distribution over the mean of the distribution over the STD
    distribution: "lognormal"
    distribution_parameters: {mean: -3.0, std: 0.6}
  endo_std_std:  # distribution over the mean of the distribution over the STD
    distribution: "uniform"
    distribution_parameters: {low: 0.01, high: 0.5}

  # SCM Implementation Settings
  scm_fast:  # faster sampling disables some checks and disabling it can be useful for debugging
    value: true
  use_exogenous_mechanisms:   #whether to use mechanisms on every exogenous variable before it is passed to the SCM
    value: true
  mechanism_generator_seed:   #seed for mechanisms. Does not fully work 
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

# ===============================================================================
# Dataset Configuration (Data Generation)
# ===============================================================================
dataset_config:   #Size of the meta-dataset (dataset of individual tabular datasets). Should have basically unlimited size
  dataset_size:
    value: 100000000
  max_number_train_samples:  #maximum number of training samples in one training dataset
    value: 1000
  number_train_samples_per_dataset:  #distribution over number of training samples in one dataset. The rest is zero-padded. The maximum number sampled here must be lower than max_number_train_samples
    distribution: "uniform"
    distribution_parameters: {low: 300, high: 1000}
  max_number_test_samples:  # maximum number of test samples
    value: 250
  number_test_samples_per_dataset: #number of test samples per dataset. Can be fixed because architecture is agnostic to the number of test samples.
    distribution: "uniform"
    distribution_parameters: {low: 100, high: 250}
  max_number_features:  # maximum number of features. It makes sense to set it to (num_nodes-1). The actual number of features is determined by num_nodes and dropout_prob (which drop out features)
    value: 19
  seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

# ===============================================================================
# Preprocessing Configuration (Data Processing)
# It determines how a dataset is preprocessed after being sampled from the prior and before being passed to training.
# ===============================================================================
preprocessing_config:   
  dropout_prob:  #probability to hide a feature after sampling a dataset
    distribution: "uniform"
    distribution_parameters: {low: 0.0, high: 0.8}  # keep it low to not drop too many features
  shuffle_data: # to make sure the data are shuffeled
    value: true
  target_feature:  # you can, in principle, fix the target.
    value: null
  negative_one_one_scaling:  # scale each feature to [-1,1] before passing it to the model
    value: true
  standardize:  # standardize (feature_i = (feature_i - mean(feature_i)) / (std(feature_i) + epsilon ))
    value: true
  remove_outliers: # remove outliers by setting them to the quantile defined below
    value: true
  outlier_quantile:
    value: 0.95
  yeo_johnson:  # whether to apply the Yeo-Johnson transformation to make the data more Gaussian-like
    value: false
  random_seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

# ===============================================================================
# Model Configuration (SimplePFN Architecture)
# Right now, the model is a simple transformer with row-wise and column-wise attention.
# ===============================================================================
model_config:
  # Core Architecture Parameters
  d_model:  # model dimension
    value: 256
  depth: # number of layers
    value: 8
  heads_feat:  # number of attention heads for feature-wise attention
    value: 4
  heads_samp: # number of attention heads for sample-wise attention
    value: 4
  dropout:  # dropout probability
    value: 0.0
  hidden_mult: # hidden dimension multiplier in the feedforward layers (usually between 1 and 4)
    value: 1
  num_features:
    value: 19  # MUST be max_number_features - 1 (50 - 1 = 49 inputs when one is target)

  # Attention backend
  use_flash_attention:  # enable PyTorch's FlashAttention kernels when available (CUDA)
    value: true

  # BarDistribution Configuration (used to model the output distribution)
  use_bar_distribution:
    value: true
  num_bars:  # number of bars (K). Higher values allow for more complex, fine-grained posteriors, but make training more difficult.
    value: 1000
  min_width:  # minimum width of each bar to avoid numerical issues
    value: 1e-10
  scale_floor:  # for the tails, this ensures that the scale is never too small
    value: 1e-8
  max_fit_items:  # maximum number of datasets to fit the BarDistribution initially.
    value: 100000
  max_fit_batches:  # maximum number of batches to use when fitting the BarDistribution initially. This is usually not critical.
    value: 100000
  log_prob_clip_min:  # clip minimum log probability to avoid numerical issues
    value: -1000000.0
  log_prob_clip_max: # clip maximum log probability to avoid numerical issues
    value: 1000000.0

# ===============================================================================
# Training Configuration 
# ===============================================================================
training_config:
  # Core Training Parameters
  learning_rate:  # usually 1e-5 - 1e-4 work well
    value: 0.0001
  weight_decay: # weight decay for optimizer, might not be needed
    value: 0.000001
  max_steps:  #critial for determing training duration!
    value: 1000
  max_epochs: # should always be 1
    value: 1

  # Data Loading Parameters
  batch_size: # batch size
    value: 8
  num_workers: # number of workers for data loading. You might need a lot because sampling is not super fast.
    value: 128

  # Training Control
  early_stopping_patience: # patience for early stopping
    value: 0
  gradient_clip_val: # gradient clipping value
    value: 1.0
  scheduler_type: # learning rate scheduler type. Only linear_warmup_cosine_decay is implemented right now
    value: "linear_warmup_cosine_decay"
  warmup_ratio: # warmup ratio for learning rate scheduler
    value: 0.1
  min_lr_ratio: # minimum learning rate ratio
    value: 0.1

  # Checkpointing
  checkpoint_dir:
    value: "/fast/arikreuter/DoPFN_v2/CausalPriorFitting/experiments/FirstTests/checkpoints"
  save_every: # save a checkpoint every n steps
    value: 500

  # Hardware Configuration
  device:
    value: "cuda"
  precision: # precision for training. 16 has not been tested yet.
    value: "32"

  # Experiment Organization
  experiment_name: # name of the experiment, used for logging 
    value: "early_test2" 
  save_dir:
    value: "./experiments/FirstTests/logs/early_test2"
  log_every_n_steps: # how often to log training metrics
    value: 5

  # Model Checkpointing
  checkpoint_every_n_steps: # how often to save a model checkpoint
    value: 600

  # Evaluation Configuration
  eval_enabled: # whether to run evaluation during training
    value: true
  eval_every: # how often to run evaluation (i.e. every n training steps)
    #value: 300
    value: 100
  eval_batches: # number of batches to use for evaluation
    #value: 200
    value: 10
  eval_dataset_size: # size of the evaluation dataset
    value: 1000000

  # Benchmark Integration (run OpenML benchmark during training)
  # Choose fidelity levels for when to run the external benchmark.
  # Options: "minimal" (1 task, basic, 1 repeat), "low" (10 tasks, basic, 1 repeat),
  #          "high" (all tasks, extended, 5 repeats), "very high" (all tasks, extended, 25 repeats)
  benchmark_eval_fidelity:
    value: "low"  # e.g., "minimal" to run at each evaluation step
  benchmark_final_fidelity:
    value: "high"  # e.g., "high" to run at the end of training

  # Model Selection Configuration
  model_selection_enabled: # whether to enable model selection for the best model
    value: true
  model_selection_metric: # metric to optimize for model selection
    value: "eval/mse_median"
  model_selection_mode: # "min" or "max" depending on whether lower or higher values of the metric are better
    value: "min"

  # Weights & Biases Integration
  wandb_project: # project name in wandb
    value: "DoPFN_v2"
  wandb_run_name: # run name in wandb
    value: "basic_10000step_1"
  wandb_tags:
    value: ["early_test", "debug", "first_run", "simplepfn"]
  wandb_notes:
    value: "First end-to-end pipeline test with wandb integration"
  wandb_offline: # whether to run wandb in offline mode
    value: false
