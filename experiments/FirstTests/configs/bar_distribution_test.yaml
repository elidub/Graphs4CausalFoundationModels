# ===============================================================================
# BarDistribution Test Configuration 
# ===============================================================================
# This configuration tests the integration of BarDistribution with SimplePFN
# It enables probabilistic training using BarDistribution instead of MSE loss
# ===============================================================================

experiment_name: "bar_distribution_test"
description: "Test SimplePFN with BarDistribution probabilistic output"

# ===============================================================================
# SCM Configuration (Structural Causal Model Generation)
# ===============================================================================
scm_config:
  # Graph Structure Parameters (smaller for testing)
  num_nodes:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 3, high: 5}
  graph_edge_prob:
    distribution: "beta"
    distribution_parameters: {alpha: 2, beta: 3}
  graph_seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}
  
  # Mechanism Type Selection
  xgboost_prob:
    distribution: "uniform"
    distribution_parameters: {low: 0.0, high: 0.3}
  mechanism_seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}
    
  # MLP Mechanism Hyperparameters
  mlp_nonlins:
    value: "tabicl"
  mlp_num_hidden_layers:
    distribution: "categorical"
    distribution_parameters: {choices: [0, 1], probabilities: [0.8, 0.2]}
  mlp_hidden_dim:
    distribution: "categorical"
    distribution_parameters: {choices: [2, 4, 8]}
  mlp_activation_mode:
    distribution: "categorical"
    distribution_parameters: {choices: ["pre", "post"]}
  mlp_node_shape:
    value: [1]
    
  # XGBoost Mechanism Hyperparameters
  xgb_num_hidden_layers:
    value: 0
  xgb_hidden_dim:
    distribution: "categorical"
    distribution_parameters: {choices: [0, 16, 32]}
  xgb_activation_mode:
    distribution: "categorical"
    distribution_parameters: {choices: ["pre", "post"]}
  xgb_node_shape:
    value: [1]
  xgb_n_training_samples:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 100, high: 300}
  xgb_add_noise:
    distribution: "categorical"
    distribution_parameters: {choices: [true, false], probabilities: [0.9, 0.1]}
    
  # Noise Distribution Parameters
  random_additive_std:
    value: true
  exo_std_distribution:
    distribution: "categorical"
    distribution_parameters: {choices: ["gamma"], probabilities: [1.0]}
  endo_std_distribution:
    distribution: "categorical"
    distribution_parameters: {choices: ["gamma"], probabilities: [1.0]}
    
  # Random Standard Deviation Parameters
  exo_std_mean:
    distribution: "lognormal"
    distribution_parameters: {mean: 0.5, std: 2.0}
  exo_std_std:
    distribution: "uniform"
    distribution_parameters: {low: 0.01, high: 2.0}
  endo_std_mean:
    distribution: "lognormal"
    distribution_parameters: {mean: -3.0, std: 0.6}
  endo_std_std:
    distribution: "uniform"
    distribution_parameters: {low: 0.1, high: 1.0}
    
  # SCM Implementation Settings
  scm_fast:
    value: true
  use_exogenous_mechanisms:
    value: true
  mechanism_generator_seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

# ===============================================================================
# Dataset Configuration (Data Generation)
# ===============================================================================
dataset_config:
  dataset_size:
    value: 100000  # Smaller for testing
  max_number_samples:
    value: 200  # Smaller for testing
  max_number_features:
    value: 6  # Smaller feature space for testing
  number_samples_per_dataset:
    distribution: "uniform"
    distribution_parameters: {low: 199, high: 200}
  seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

# ===============================================================================
# Preprocessing Configuration (Data Processing)
# ===============================================================================
preprocessing_config:
  train_fraction:
    value: 0.5
  dropout_prob:
    value: 0.1
  transformation_type:
    value: "standardize"
  shuffle_data:
    value: true
  target_feature:
    value: null
  random_seed:
    distribution: "discrete_uniform"
    distribution_parameters: {low: 0, high: 100000}

# ===============================================================================
# Model Configuration (SimplePFN Architecture + BarDistribution)
# ===============================================================================
model_config:
  # Core Architecture Parameters
  d_model: 128      # Smaller for testing
  depth: 3          # Fewer layers for testing
  heads_feat: 4    
  heads_samp: 4    
  dropout: 0.1     
  
  # Critical Parameter (automatically calculated)
  num_features: 5  # MUST be max_number_features - 1 (6-1=5)
                   
  # BarDistribution Configuration
  use_bar_distribution: true    # Enable BarDistribution
  num_bars: 7                   # Number of bars (K=7)
  min_width: 1e-6              # Minimum bar width
  scale_floor: 1e-6            # Minimum tail scale
  max_fit_items: 10000         # Limit data for fitting (faster)
  log_prob_clip_min: -50.0     # Clip log probabilities for stability
  log_prob_clip_max: 50.0      # Clip log probabilities for stability
  # Output dimension will be automatically calculated as num_bars + 4 = 11

# ===============================================================================
# Training Configuration (PyTorch Lightning Setup)
# ===============================================================================
training_config:
  # Core Training Parameters
  learning_rate:
    value: 0.001  # Higher LR for faster convergence
  weight_decay:
    value: 0.000001
  max_steps:
    value: 1000   # Shorter for testing
  max_epochs:
    value: 1
    
  # Data Loading Parameters
  batch_size:
    value: 64    # Smaller batch size for testing
  num_workers:
    value: 4     # Fewer workers for testing
    
  # Training Control
  early_stopping_patience:
    value: 0
  gradient_clip_val:
    value: 1.0
  scheduler_type:
    value: "linear_warmup_cosine_decay"
  warmup_ratio:
    value: 0.05
  min_lr_ratio:
    value: 0.1
  
  # Checkpointing
  checkpoint_dir:
    value: "./experiments/FirstTests/checkpoints"
  save_every:
    value: 200  # Save more frequently for testing
    
  # Hardware Configuration
  device:
    value: "cuda"
  precision:
    value: "32"
    
  # Experiment Organization
  experiment_name:
    value: "bar_distribution_test"
  save_dir:
    value: "./experiments/FirstTests/logs/bar_distribution_test"
  log_every_n_steps:
    value: 10   # More frequent logging
    
  # Model Checkpointing
  checkpoint_every_n_steps:
    value: 200
    
  # Weights & Biases Integration
  wandb_project:
    value: "DoPFN_v2"
  wandb_run_name:
    value: null
  wandb_tags:
    value: ["bar_distribution", "test", "probabilistic", "simplepfn"]
  wandb_notes:
    value: "Testing SimplePFN with BarDistribution probabilistic output"
  wandb_offline:
    value: false
